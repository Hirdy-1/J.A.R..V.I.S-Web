<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web J.A.R.V.I.S.</title>
    <style>
        body {
            background-color: #0a0f1d;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #arc-reactor {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #00f0ff;
            box-shadow: 0 0 25px #00f0ff, inset 0 0 25px #00f0ff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: radial-gradient(circle, rgba(0,240,255,0.2) 0%, rgba(0,0,0,0) 70%);
        }
        #arc-reactor:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00f0ff, inset 0 0 30px #00f0ff;
        }
        #arc-reactor.listening {
            border-color: #ff0055;
            box-shadow: 0 0 40px #ff0055, inset 0 0 25px #ff0055;
            animation: pulse 1.2s infinite;
            background: radial-gradient(circle, rgba(255,0,85,0.2) 0%, rgba(0,0,0,0) 70%);
        }
        #status { 
            margin-top: 30px; 
            font-size: 1.3rem; 
            text-shadow: 0 0 8px #00f0ff; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #log { 
            margin-top: 15px; 
            color: #5599aa; 
            font-size: 1rem; 
            max-width: 80%; 
            text-align: center;
            line-height: 1.4;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="arc-reactor" onclick="toggleListening()"></div>
    <div id="status">Click Arc Reactor to Initialize</div>
    <div id="log">Systems offline. Ready when you are.</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome or MS Edge.");
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const reactor = document.getElementById('arc-reactor');
        const statusText = document.getElementById('status');
        const logText = document.getElementById('log');
        let isListening = false;
        let lastError = null;

        function toggleListening() {
            if (!isListening) {
                lastError = null;
                window.speechSynthesis.cancel(); 
                try {
                    recognition.start();
                } catch(e) {
                    console.log("Recognition active or resetting.");
                }
            } else {
                recognition.stop();
            }
        }

        recognition.onstart = () => {
            isListening = true;
            reactor.classList.add('listening');
            statusText.innerText = "Listening, sir...";
            logText.innerText = "Speak your command now.";
        };

        recognition.onend = () => {
            isListening = false;
            reactor.classList.remove('listening');
            
            if (lastError === 'no-speech') {
                statusText.innerText = "Click Arc Reactor to Initialize";
                logText.innerText = "Systems went silent. Tap the reactor again when ready, sir.";
            }
        };

        recognition.onerror = (event) => {
            lastError = event.error;
            if (event.error === 'no-speech') {
                console.warn("Speech API Timeout: No input detected.");
            } else if (event.error === 'not-allowed') {
                statusText.innerText = "Access Denied";
                logText.innerText = "Microphone blocked. Check site security rules.";
            } else {
                statusText.innerText = "Audio Error";
                logText.innerText = `Speech error: ${event.error}`;
            }
        };

        recognition.onresult = async (event) => {
            const userText = event.results.transcript;
            logText.innerText = `You: "${userText}"`;
            statusText.innerText = "Analyzing Audio...";

            try {
                // Uses a relative endpoint so it dynamically speaks to the hosting domain automatically
                const response = await fetch('/api/jarvis/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: userText })
                });
                
                if (!response.ok) throw new Error("Endpoint returned invalid data.");
                const data = await response.json();
                
                statusText.innerText = "Synthesizing Vocalization...";
                speak(data.response);
            } catch (error) {
                statusText.innerText = "Core Connection Failure";
                logText.innerText = "Could not locate live API service pipeline backend routes.";
                console.error(error);
            }
        };

        function speak(text) {
            logText.innerText = `JARVIS: "${text}"`;
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            const jarvisVoice = voices.find(voice => voice.lang.includes('en-GB') && voice.name.toLowerCase().includes('male')) 
                               || voices.find(voice => voice.lang.includes('en-GB'))
                               || voices;
            
            if (jarvisVoice) utterance.voice = jarvisVoice;
            
            utterance.onend = () => {
                statusText.innerText = "Standing By, Sir";
            };
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
